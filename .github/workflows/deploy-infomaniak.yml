name: Deploy front to Infomaniak VPS

on:
  workflow_call:
    inputs:
      artifact:
        description: "Nom du package pnpm, ex. @workspace/helvetique-patrimoine"
        required: true
        type: string
      domain:
        description: "Domaine, ex. helvetique-patrimoine.ch"
        required: true
        type: string
      host:
        description: "IP du VPS, ex. 179.237.70.246 (FR) ou 179.237.70.207 (DE)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build front prerendu
        env:
          PORT: "10000"
          BASE_PATH: "/"
          NODE_ENV: production
        run: pnpm --filter ${{ inputs.artifact }} run build

      - name: Cle SSH de deploiement
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ inputs.host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploiement atomique
        run: |
          set -euo pipefail
          TS=$(date +%Y%m%d-%H%M%S)
          BASE="/var/www/${{ inputs.domain }}"
          SRC=$(find . -type d -path '*/dist/public' | head -n1)
          test -n "$SRC" || { echo "ERREUR: dist/public introuvable apres build"; exit 1; }
          echo "Source build : $SRC"

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            "$SRC/" \
            deploy@${{ inputs.host }}:"$BASE/releases/$TS/"

          ssh -i ~/.ssh/id_ed25519 deploy@${{ inputs.host }} "
            ln -sfn '$BASE/releases/$TS' '$BASE/current' &&
            ls -1dt $BASE/releases/*/ | tail -n +6 | xargs -r rm -rf
          "
          echo "Deploye : ${{ inputs.domain }} -> release $TS"
